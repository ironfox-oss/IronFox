# IronFox local.properties for UnifiedPush-AC

# NOTE: Values surrounded in curly brackets ({}) are filled in by `build.sh`
## Currently, this includes:
## APPSERVICES_VERSION = {APPSERVICES_VERSION}
## FIREFOX_VERSION = {FIREFOX_VERSION}
## IF_EPOCH_NS = {IF_EPOCH_NS}

# Set versions

## Application Services
as.version=0.0.1-SNAPSHOT-{IF_EPOCH_NS}-{APPSERVICES_VERSION}

## Mozilla
mozilla.version={FIREFOX_VERSION}
